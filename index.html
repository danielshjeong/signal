<!DOCTYPE html>
<html lang="en">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Spline+Sans:wght@400;500;600&display=swap');
:root{
  --bg:#0e0e10;--surface:#17171b;--surface2:#1f1f25;--border:#26262c;
  --text:#ededf0;--dim:#9a9aa4;--faint:#55555e;
  --work:#6ee7d4;--personal:#c4b5fd;
  --slack:#e8c547;--email:#6ee7d4;--note:#c4b5fd;--other:#94a3b8;
  --high:#fb7185;--med:#fbbf24;--low:#4ade80;--accent:#e8c547;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Spline Sans',sans-serif;min-height:100dvh}
body{background-image:radial-gradient(1100px 500px at 85% -5%,rgba(232,197,71,.055),transparent 60%),radial-gradient(800px 450px at -5% 8%,rgba(196,181,253,.045),transparent 55%)}
.app{max-width:640px;margin:0 auto;padding:calc(18px + var(--safe-t)) 16px calc(130px + var(--safe-b))}

/* header */
header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.logo{width:40px;height:40px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--high));display:grid;place-items:center}
.logo svg{width:20px;height:20px}
.hd h1{font-family:'Fraunces',serif;font-size:24px;font-weight:600;letter-spacing:-.02em;line-height:1}
.hd p{font-size:11.5px;color:var(--dim);margin-top:2px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.date-pill{font-size:11px;color:var(--dim);text-align:right;line-height:1.5}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--faint);transition:background .3s;flex-shrink:0;cursor:pointer}
.sync-dot.synced{background:var(--low)}
.sync-dot.syncing{background:var(--med);animation:pulse 1s infinite}
.sync-dot.error{background:var(--high)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* nav */
.nav{display:flex;background:var(--surface2);border-radius:13px;padding:4px;margin-bottom:18px;gap:4px}
.nav button{flex:1;font-family:inherit;font-size:13px;font-weight:600;padding:9px 8px;border:none;border-radius:10px;background:transparent;color:var(--dim);cursor:pointer;transition:all .15s}
.nav button.on{background:var(--surface);color:var(--text)}

/* category chips */
.cats{display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;font-family:inherit;font-size:12.5px;font-weight:600;padding:8px 15px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--dim);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.cat .cnt{font-size:10.5px;background:var(--surface2);padding:1px 6px;border-radius:999px;color:var(--faint)}
.cat.on{color:#0a0a0a}.cat.on.all{background:var(--text);border-color:var(--text)}
.cat.on.work{background:var(--work);border-color:var(--work)}
.cat.on.personal{background:var(--personal);border-color:var(--personal)}
.cat.on .cnt{background:rgba(0,0,0,.18);color:rgba(0,0,0,.55)}

/* status filter */
.status-row{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.stf{font-family:inherit;font-size:12px;font-weight:600;padding:6px 13px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s}
.stf.on{border-color:currentColor}
.stf.on.sf-all{color:var(--text)}.stf.on.sf-active{color:var(--accent)}
.stf.on.sf-done{color:var(--low)}.stf.on.sf-cancelled{color:var(--faint);border-color:var(--faint)}

/* groups */
.group{margin-bottom:20px}
.group-head{display:flex;align-items:baseline;gap:8px;margin:0 0 11px}
.group-title{font-size:11.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);font-weight:600}
.group-rule{flex:1;height:1px;background:var(--border)}
.group-ct{font-size:11px;color:var(--faint)}

/* cards */
.card{display:flex;gap:11px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-left-width:3px;border-radius:13px;padding:12px 13px;margin-bottom:9px;animation:rise .3s ease both}
.card.cat-work{border-left-color:var(--work)}.card.cat-personal{border-left-color:var(--personal)}
.card.st-done{opacity:.52}.card.st-cancelled{opacity:.38}
.card.st-done .ctitle,.card.st-cancelled .ctitle{text-decoration:line-through}
.card.st-cancelled .ctitle{color:var(--faint)}
@keyframes rise{from{opacity:0;transform:translateY(7px)}}
.ccheck{flex-shrink:0;width:21px;height:21px;border-radius:6px;margin-top:1px;border:2px solid #44444c;background:transparent;cursor:pointer;display:grid;place-items:center;transition:all .15s}
.ccheck.done{background:var(--low);border-color:var(--low)}.ccheck.cancelled{background:var(--faint);border-color:var(--faint)}
.ccheck svg{width:12px;height:12px}
.cbody{flex:1;min-width:0}
.ctitle{font-size:14.5px;font-weight:600;line-height:1.35;word-break:break-word}
.cdetail{font-size:12.5px;color:var(--dim);line-height:1.4;margin-top:4px}
.cmeta{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;border:1px solid;background:transparent;white-space:nowrap}
.pill svg,.due svg{width:9px;height:9px}
.due{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:500;color:#cfcfd6}
.ts{font-size:10px;color:var(--faint);margin-top:6px}
.cactions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.cact{background:transparent;border:none;color:var(--faint);cursor:pointer;padding:3px;border-radius:6px;display:grid;place-items:center;transition:color .12s}
.cact:hover{color:var(--dim)}.cact svg{width:14px;height:14px}

/* empty */
.empty{display:flex;flex-direction:column;align-items:center;gap:11px;padding:54px 20px;color:var(--faint);text-align:center}
.empty svg{width:32px;height:32px}.empty p{font-size:13.5px;line-height:1.5}

/* fab */
.fab{position:fixed;right:18px;bottom:calc(20px + var(--safe-b));z-index:20;width:56px;height:56px;border-radius:17px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--high));color:#0a0a0a;display:grid;place-items:center;box-shadow:0 8px 26px rgba(232,197,71,.32);transition:transform .15s}
.fab:active{transform:scale(.91)}.fab svg{width:24px;height:24px}

/* sheet */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:30;opacity:0;pointer-events:none;transition:opacity .22s}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--surface);border-radius:22px 22px 0 0;border-top:1px solid var(--border);padding:6px 17px calc(20px + var(--safe-b));transform:translateY(110%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-width:640px;margin:0 auto;max-height:90dvh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.grab{width:36px;height:4px;border-radius:999px;background:#3a3a42;margin:8px auto 15px}
.sheet h2{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-bottom:14px}
.lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);font-weight:600;margin:0 0 7px}
.row{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.chip{font-family:inherit;font-size:12px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s}
.chip.sel{color:#0a0a0a}
.chip.sel[data-v="work"]{background:var(--work);border-color:var(--work)}
.chip.sel[data-v="personal"]{background:var(--personal);border-color:var(--personal)}
.chip.sel[data-v="slack"]{background:var(--slack);border-color:var(--slack)}
.chip.sel[data-v="email"]{background:var(--email);border-color:var(--email)}
.chip.sel[data-v="note"]{background:var(--note);border-color:var(--note)}
.chip.sel[data-v="other"]{background:var(--other);border-color:var(--other)}
.seg{display:flex;background:var(--surface2);border-radius:11px;padding:3px;margin-bottom:14px}
.seg button{flex:1;font-family:inherit;font-size:12.5px;font-weight:600;padding:8px;border:none;border-radius:9px;background:transparent;color:var(--dim);cursor:pointer;transition:all .15s}
.seg button.on{background:var(--surface);color:var(--text)}
textarea{width:100%;resize:vertical;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:11px;padding:12px;font-family:inherit;font-size:13.5px;line-height:1.5;outline:none;min-height:105px}
textarea:focus{border-color:var(--accent)}
.btn{font-family:inherit;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border-radius:11px;border:none;cursor:pointer;width:100%;margin-top:11px;transition:opacity .15s}
.btn:disabled{opacity:.4}.btn-primary{background:var(--accent);color:#0a0a0a}.btn-ghost{background:var(--surface2);color:var(--text)}
.err{font-size:12px;color:var(--high);margin-top:9px}
.hint{font-size:11.5px;color:var(--dim);margin-top:12px;line-height:1.5}
.hint a{color:var(--accent)}
.keyrow{display:flex;gap:7px;margin-top:7px}
.keyrow input{flex:1;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:9px;padding:10px 11px;font-family:inherit;font-size:12.5px;outline:none}
.keyrow input:focus{border-color:var(--accent)}
.keyrow .btn{width:auto;margin:0;padding:10px 15px}
.copied{font-size:11.5px;color:var(--low);text-align:center;margin-top:7px;min-height:14px}

/* stats */
.stats{display:flex;margin-bottom:18px;background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.stat{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1}
.stat-l{font-size:10px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}

/* setup banner */
.setup-banner{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:13px;padding:14px 16px;margin-bottom:18px}
.setup-banner h3{font-size:13.5px;font-weight:600;margin-bottom:6px;color:var(--accent)}
.setup-banner p{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:10px}
.setup-banner .srow{display:flex;gap:7px}
.setup-banner input{flex:1;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:8px;padding:9px 10px;font-family:inherit;font-size:12px;outline:none}
.setup-banner input:focus{border-color:var(--accent)}
.setup-banner .btn{margin:0;padding:9px 14px;font-size:12px;width:auto}

.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><svg viewBox="0 0 72 72" fill="none"><path d="M36 0L44 28L72 36L44 44L36 72L28 44L0 36L28 28Z" fill="#0a0a0a"/></svg></div>
    <div class="hd"><h1>Signal</h1><p>Turn messages into momentum.</p></div>
    <div class="header-right">
      <div class="date-pill" id="datePill"></div>
      <div class="sync-dot" id="syncDot" title="Sync status"></div>
    </div>
  </header>

  <div id="setupBanner"></div>

  <div class="nav" id="mainNav">
    <button data-view="today" class="on">Today</button>
    <button data-view="history">History</button>
  </div>

  <div id="todayView">
    <div class="cats" id="cats"></div>
    <div id="board"></div>
  </div>

  <div id="historyView" style="display:none">
    <div class="stats" id="statsBar"></div>
    <div class="cats" id="hcats"></div>
    <div class="status-row" id="statusRow"></div>
    <div id="hboard"></div>
  </div>
</div>

<button class="fab" id="fab" aria-label="Add tasks">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <h2>Capture tasks</h2>
  <p class="lbl">Category</p>
  <div class="row" id="catChips"></div>
  <p class="lbl">Source</p>
  <div class="row" id="srcChips"></div>
  <textarea id="input" placeholder="Paste a Slack message, email, or any text…"></textarea>
  <div class="seg" id="modeSeg" style="margin-top:12px">
    <button data-mode="auto" class="on">Auto-extract (API key)</button>
    <button data-mode="manual">Manual (via Claude)</button>
  </div>
  <div id="autoPane">
    <div id="keyBlock">
      <p class="lbl">Anthropic API key — stored only on this device</p>
      <div class="keyrow">
        <input id="keyInput" type="password" placeholder="sk-ant-…" autocomplete="off" spellcheck="false"/>
        <button class="btn btn-ghost" id="saveKey">Save</button>
      </div>
    </div>
    <button class="btn btn-primary" id="extractBtn">
      <svg id="extractIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span id="extractLabel">Extract tasks</span>
    </button>
    <p class="err" id="err" style="display:none"></p>
    <p class="hint">Your Anthropic key never leaves this device. <a href="https://console.anthropic.com/settings/keys" target="_blank">Get a key →</a></p>
  </div>
  <div id="manualPane" style="display:none">
    <button class="btn btn-primary" id="copyBtn">Copy prompt for Claude</button>
    <p class="copied" id="copied"></p>
    <p class="hint">Paste that into Claude, copy the JSON it returns, paste it below.</p>
    <textarea id="pasteBack" placeholder="Paste Claude's JSON response here…" style="min-height:75px;margin-top:10px"></textarea>
    <button class="btn btn-ghost" id="importBtn">Import tasks</button>
    <p class="err" id="err2" style="display:none"></p>
  </div>
</div>

<script>
// ── Config (filled in by user) ─────────────────────────────
const CFG_KEY   = "signal.supabase.v1";
const ANT_KEY   = "signal.apikey.v1";
const STORE_KEY = "signal.tasks.v2";

// ── Constants ──────────────────────────────────────────────
const SOURCES    = {slack:"Slack",email:"Email",note:"Note",other:"Other"};
const CATEGORIES = {work:"Work",personal:"Personal"};
const PRIO       = {high:"High",medium:"Medium",low:"Low"};
const STATUS     = {active:"Active",done:"Done",cancelled:"Cancelled"};

const IC = {
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round"><path d="M5 12l5 5L20 6"/></svg>`,
  x:`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`,
  trash:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2m-9 0v14h10V6"/></svg>`,
  flag:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><path d="M4 22V4"/></svg>`,
  clock:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`,
  inbox:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5 6h14l3 6v6H2v-6z"/></svg>`,
  ban:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M4.93 4.93l14.14 14.14"/></svg>`,
  undo:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 10h11a5 5 0 010 10H9"/><path d="M3 10l4-4M3 10l4 4"/></svg>`,
  sync:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>`,
};

// ── State ──────────────────────────────────────────────────
let tasks        = loadLocal();
let view         = "today";
let catFilter    = "all";
let hCatFilter   = "all";
let statusFilter = "all";
let draftCat     = "work";
let draftSrc     = "slack";
let mode         = "auto";
let syncCfg      = loadCfg();   // {url, anonKey} or null

const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

// ── Local storage ──────────────────────────────────────────
function loadLocal(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY))||[]; }catch{ return []; } }
function saveLocal(){ localStorage.setItem(STORE_KEY, JSON.stringify(tasks)); }
function loadCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY))||null; }catch{ return null; } }
function saveCfg(c){ localStorage.setItem(CFG_KEY, JSON.stringify(c)); syncCfg=c; }

// ── Supabase helpers ───────────────────────────────────────
function sbHeaders(){
  return {"Content-Type":"application/json","apikey":syncCfg.anonKey,"Authorization":"Bearer "+syncCfg.anonKey};
}
function sbUrl(path){ return syncCfg.url.replace(/\/$/,"")+"/rest/v1"+path; }

async function sbFetch(path, opts={}){
  const r = await fetch(sbUrl(path), {...opts, headers:{...sbHeaders(),...(opts.headers||{})}});
  if(!r.ok){ const t=await r.text(); throw new Error(t||r.status); }
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

async function syncDown(){
  if(!syncCfg) return;
  setSyncStatus("syncing");
  try{
    const rows = await sbFetch("/tasks?select=*&order=created_at.desc");
    if(!Array.isArray(rows)) return;
    // Merge: remote wins for any id that exists remotely; keep local-only tasks too
    const remoteIds = new Set(rows.map(r=>r.id));
    const localOnly = tasks.filter(t=>!remoteIds.has(t.id));
    tasks = [...rows.map(dbToTask), ...localOnly];
    saveLocal();
    renderAll();
    setSyncStatus("synced");
  }catch(e){ console.warn("syncDown",e); setSyncStatus("error"); }
}

async function syncUp(task){
  if(!syncCfg) return;
  setSyncStatus("syncing");
  try{
    await sbFetch("/tasks", {
      method:"POST",
      headers:{"Prefer":"resolution=merge-duplicates,return=minimal"},
      body: JSON.stringify(taskToDb(task))
    });
    setSyncStatus("synced");
  }catch(e){ console.warn("syncUp",e); setSyncStatus("error"); }
}

async function syncDelete(id){
  if(!syncCfg) return;
  try{ await sbFetch("/tasks?id=eq."+id, {method:"DELETE"}); }
  catch(e){ console.warn("syncDelete",e); }
}

function taskToDb(t){
  return {
    id:          t.id,
    title:       t.title,
    detail:      t.detail||null,
    priority:    t.priority,
    due:         t.due||null,
    category:    t.category,
    source:      t.source,
    status:      t.status,
    created_at:  new Date(t.createdAt).toISOString(),
    resolved_at: t.resolvedAt ? new Date(t.resolvedAt).toISOString() : null,
  };
}
function dbToTask(r){
  return {
    id:          r.id,
    title:       r.title,
    detail:      r.detail||"",
    priority:    r.priority,
    due:         r.due||null,
    category:    r.category,
    source:      r.source,
    status:      r.status,
    createdAt:   new Date(r.created_at).getTime(),
    resolvedAt:  r.resolved_at ? new Date(r.resolved_at).getTime() : null,
  };
}

function setSyncStatus(s){
  const d = $("#syncDot");
  d.className = "sync-dot " + s;
  d.title = s==="synced"?"Synced":s==="syncing"?"Syncing…":s==="error"?"Sync error — check Supabase config":"Sync not configured";
}

// ── Setup banner ───────────────────────────────────────────
function renderSetupBanner(){
  const b = $("#setupBanner");
  if(syncCfg){ b.innerHTML=""; return; }
  b.innerHTML = `
    <div class="setup-banner">
      <h3>Connect Supabase to sync across devices</h3>
      <p>Paste your Supabase Project URL and anon key below. Takes 2 minutes — see the setup guide included with this file.</p>
      <div class="srow" style="margin-bottom:8px">
        <input id="sbUrl" placeholder="https://xxxx.supabase.co" spellcheck="false"/>
      </div>
      <div class="srow">
        <input id="sbKey" placeholder="eyJ… (anon key)" spellcheck="false"/>
        <button class="btn btn-primary" id="sbSave">Connect</button>
      </div>
      <p class="err" id="sbErr" style="display:none;margin-top:8px"></p>
    </div>`;
  $("#sbSave").onclick = async ()=>{
    const url = $("#sbUrl").value.trim();
    const key = $("#sbKey").value.trim();
    const errEl = $("#sbErr");
    if(!url||!key){ errEl.textContent="Both fields required."; errEl.style.display="block"; return; }
    // quick test
    $("#sbSave").disabled=true; $("#sbSave").textContent="Testing…";
    try{
      syncCfg = {url, anonKey:key};
      await sbFetch("/tasks?select=id&limit=1");
      saveCfg(syncCfg);
      renderSetupBanner();
      syncDown();
    }catch(e){
      syncCfg=null;
      errEl.textContent="Couldn't connect: "+e.message+". Double-check URL and key.";
      errEl.style.display="block";
      $("#sbSave").disabled=false; $("#sbSave").textContent="Connect";
    }
  };
}

// ── Date helpers ───────────────────────────────────────────
function fmtDate(ts){
  const d=new Date(ts),now=new Date();
  const diff=Math.floor((now-d)/86400000);
  if(diff===0) return "Today, "+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  if(diff===1) return "Yesterday";
  if(diff<7)   return d.toLocaleDateString([],{weekday:'long'});
  return d.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
}
function isToday(ts){
  const d=new Date(ts),n=new Date();
  return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();
}
function renderDatePill(){
  const d=new Date();
  $("#datePill").innerHTML=d.toLocaleDateString([],{weekday:'long'})+"<br>"+d.toLocaleDateString([],{month:'short',day:'numeric'});
}

// ── Category chips ─────────────────────────────────────────
function renderCatChips(cid,getF,setF,subset){
  const counts={all:subset.filter(t=>t.status==='active').length};
  Object.keys(CATEGORIES).forEach(c=>counts[c]=subset.filter(t=>t.category===c&&t.status==='active').length);
  const el=$(cid); el.innerHTML="";
  const make=(key,label)=>{
    const b=document.createElement("button");
    b.className="cat "+key+(getF()===key?" on":"");
    b.innerHTML=label+`<span class="cnt">${counts[key]||0}</span>`;
    b.onclick=()=>{setF(key);renderAll();};
    el.appendChild(b);
  };
  make("all","All");
  Object.entries(CATEGORIES).forEach(([k,v])=>make(k,v));
}

// ── Today view ─────────────────────────────────────────────
function renderToday(){
  const today=tasks.filter(t=>isToday(t.createdAt));
  renderCatChips("#cats",()=>catFilter,v=>catFilter=v,today);
  const board=$("#board"); board.innerHTML="";
  let list=catFilter==="all"?today:today.filter(t=>t.category===catFilter);
  if(!list.length){ board.innerHTML=`<div class="empty">${IC.inbox}<p>Nothing captured today yet.<br>Tap + to extract tasks from a message.</p></div>`; return; }
  const active=list.filter(t=>t.status==='active');
  const done=list.filter(t=>t.status==='done');
  const cancelled=list.filter(t=>t.status==='cancelled');
  if(active.length)    board.appendChild(mkGroup("To do",active));
  if(done.length)      board.appendChild(mkGroup("Done",done));
  if(cancelled.length) board.appendChild(mkGroup("Dismissed",cancelled));
}

// ── History view ───────────────────────────────────────────
function renderHistory(){
  const sb=$("#statsBar");
  const total=tasks.length,doneN=tasks.filter(t=>t.status==='done').length,
        cancelN=tasks.filter(t=>t.status==='cancelled').length,activeN=tasks.filter(t=>t.status==='active').length;
  sb.innerHTML=`
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--accent)">${activeN}</div><div class="stat-l">Active</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--low)">${doneN}</div><div class="stat-l">Done</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--faint)">${cancelN}</div><div class="stat-l">Dismissed</div></div>`;

  renderCatChips("#hcats",()=>hCatFilter,v=>hCatFilter=v,tasks);

  const sr=$("#statusRow"); sr.innerHTML="";
  [["all","All"],["active","Active"],["done","Done"],["cancelled","Dismissed"]].forEach(([k,l])=>{
    const b=document.createElement("button");
    b.className=`stf sf-${k}`+(statusFilter===k?" on":"");
    b.textContent=l; b.onclick=()=>{statusFilter=k;renderAll();};
    sr.appendChild(b);
  });

  const hboard=$("#hboard"); hboard.innerHTML="";
  let list=tasks.slice().sort((a,b)=>b.createdAt-a.createdAt);
  if(hCatFilter!=="all") list=list.filter(t=>t.category===hCatFilter);
  if(statusFilter!=="all") list=list.filter(t=>t.status===statusFilter);
  if(!list.length){ hboard.innerHTML=`<div class="empty">${IC.inbox}<p>No tasks match this filter.</p></div>`; return; }

  const byDay={};
  list.forEach(t=>{
    const d=new Date(t.createdAt);
    const key=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
    const label=isToday(t.createdAt)?"Today":(new Date()-d<86400000*2?"Yesterday":d.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'}));
    if(!byDay[key]) byDay[key]={label,items:[]};
    byDay[key].items.push(t);
  });
  Object.values(byDay).forEach(({label,items})=>hboard.appendChild(mkGroup(label,items,true)));
}

function renderAll(){ if(view==='today') renderToday(); else renderHistory(); }

// ── Group + card ───────────────────────────────────────────
function mkGroup(title,items,showTs=false){
  const g=document.createElement("div"); g.className="group";
  g.innerHTML=`<div class="group-head"><span class="group-title">${title}</span><span class="group-rule"></span><span class="group-ct">${items.length}</span></div>`;
  items.forEach(t=>g.appendChild(mkCard(t,showTs)));
  return g;
}

function mkCard(t,showTs=false){
  const el=document.createElement("div");
  el.className=`card cat-${t.category} st-${t.status}`;
  const pc={high:"--high",medium:"--med",low:"--low"}[t.priority]||"--med";
  const ckCls=t.status==='done'?'done':t.status==='cancelled'?'cancelled':'';
  const ckIc=t.status==='done'?IC.check:t.status==='cancelled'?IC.x:'';
  el.innerHTML=`
    <button class="ccheck ${ckCls}">${ckIc}</button>
    <div class="cbody">
      <p class="ctitle">${esc(t.title)}</p>
      ${t.detail?`<p class="cdetail">${esc(t.detail)}</p>`:''}
      <div class="cmeta">
        <span class="pill" style="color:var(--${t.category});border-color:var(--${t.category})">${CATEGORIES[t.category]||'—'}</span>
        <span class="pill" style="color:var(--${t.source});border-color:var(--${t.source})">${SOURCES[t.source]||'—'}</span>
        <span class="pill" style="color:var(${pc});border-color:var(${pc})">${IC.flag}${PRIO[t.priority]||'Med'}</span>
        ${t.due?`<span class="due">${IC.clock}${esc(t.due)}</span>`:''}
      </div>
      ${showTs?`<p class="ts">${fmtDate(t.createdAt)}${t.resolvedAt?' · '+STATUS[t.status]+' '+fmtDate(t.resolvedAt):''}</p>`:''}
    </div>
    <div class="cactions">
      ${t.status!=='active'?`<button class="cact undo-btn">${IC.undo}</button>`:''}
      ${t.status==='active'?`<button class="cact done-btn">${IC.check}</button>`:''}
      ${t.status==='active'?`<button class="cact cancel-btn">${IC.ban}</button>`:''}
      <button class="cact del-btn">${IC.trash}</button>
    </div>`;
  el.querySelector(".ccheck").onclick=()=>{ setStatus(t.id,t.status==='active'?'done':'active'); };
  const db=el.querySelector(".done-btn"); if(db) db.onclick=()=>setStatus(t.id,'done');
  const cb=el.querySelector(".cancel-btn"); if(cb) cb.onclick=()=>setStatus(t.id,'cancelled');
  const ub=el.querySelector(".undo-btn"); if(ub) ub.onclick=()=>setStatus(t.id,'active');
  el.querySelector(".del-btn").onclick=()=>deleteTask(t.id);
  return el;
}

function setStatus(id,status){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  t.status=status; t.resolvedAt=status!=='active'?Date.now():null;
  saveLocal(); renderAll(); syncUp(t);
}
function deleteTask(id){
  tasks=tasks.filter(x=>x.id!==id);
  saveLocal(); renderAll(); syncDelete(id);
}

// ── Nav ────────────────────────────────────────────────────
$$("#mainNav button").forEach(b=>{
  b.onclick=()=>{
    view=b.dataset.view;
    $$("#mainNav button").forEach(x=>x.classList.toggle("on",x===b));
    $("#todayView").style.display=view==="today"?"block":"none";
    $("#historyView").style.display=view==="history"?"block":"none";
    renderAll();
  };
});

// ── Sheet ──────────────────────────────────────────────────
const scrim=$("#scrim"),sheet=$("#sheet");
function openSheet(){ scrim.classList.add("open"); sheet.classList.add("open"); }
function closeSheet(){ scrim.classList.remove("open"); sheet.classList.remove("open"); }
$("#fab").onclick=openSheet; scrim.onclick=closeSheet;

function buildChips(cid,map,getV,setV){
  const c=$(cid); c.innerHTML="";
  Object.entries(map).forEach(([k,v])=>{
    const b=document.createElement("button");
    b.className="chip"+(getV()===k?" sel":""); b.dataset.v=k; b.textContent=v;
    b.onclick=()=>{setV(k);buildChips(cid,map,getV,setV);};
    c.appendChild(b);
  });
}
buildChips("#catChips",CATEGORIES,()=>draftCat,v=>draftCat=v);
buildChips("#srcChips",SOURCES,()=>draftSrc,v=>draftSrc=v);

$$("#modeSeg button").forEach(b=>{
  b.onclick=()=>{
    mode=b.dataset.mode;
    $$("#modeSeg button").forEach(x=>x.classList.toggle("on",x===b));
    $("#autoPane").style.display=mode==="auto"?"block":"none";
    $("#manualPane").style.display=mode==="manual"?"block":"none";
  };
});

// ── API key ────────────────────────────────────────────────
function getKey(){ return localStorage.getItem(ANT_KEY)||""; }
function refreshKeyUI(){ $("#keyBlock").style.display=getKey()?"none":"block"; }
$("#saveKey").onclick=()=>{
  const v=$("#keyInput").value.trim();
  if(v){ localStorage.setItem(ANT_KEY,v); $("#keyInput").value=""; refreshKeyUI(); }
};
refreshKeyUI();

// ── Prompt ─────────────────────────────────────────────────
function buildPrompt(text,src){
  return `You are a task-extraction engine. Read the following ${SOURCES[src]||'message'} and extract every concrete, actionable to-do item. Infer implicit tasks and deadlines from context.

Return ONLY a JSON array. No preamble, no markdown fences. Each object:
- "title": short imperative phrase
- "detail": one sentence of context
- "priority": "high" | "medium" | "low"
- "due": due date/time if stated or implied, else null

If no actionable tasks, return [].

Message:
"""
${text}
"""`;
}

function addParsed(arr){
  const now=Date.now();
  const added=arr.map((t,i)=>({
    id:now+i, title:t.title||"Untitled", detail:t.detail||"",
    priority:["high","medium","low"].includes(t.priority)?t.priority:"medium",
    due:t.due||null, category:draftCat, source:draftSrc,
    status:"active", createdAt:now+i, resolvedAt:null,
  }));
  tasks=[...added,...tasks];
  saveLocal(); renderAll();
  added.forEach(t=>syncUp(t));
}

// ── Auto extract ───────────────────────────────────────────
$("#extractBtn").onclick=async()=>{
  const text=$("#input").value.trim();
  const errEl=$("#err"); errEl.style.display="none";
  if(!text) return;
  const key=getKey();
  if(!key){ refreshKeyUI(); errEl.textContent="Add your API key first."; errEl.style.display="block"; return; }
  setLoading(true);
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:buildPrompt(text,draftSrc)}]})
    });
    const data=await r.json();
    if(data.error) throw new Error(data.error.message||"API error");
    const raw=(data.content||[]).filter(i=>i.type==="text").map(i=>i.text).join("\n").replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(raw);
    if(!Array.isArray(parsed)) throw new Error("Unexpected format");
    addParsed(parsed); $("#input").value=""; closeSheet();
  }catch(e){ errEl.textContent="Couldn't extract: "+(e.message||"try again"); errEl.style.display="block"; }
  finally{ setLoading(false); }
};
function setLoading(on){
  $("#extractBtn").disabled=on;
  $("#extractLabel").textContent=on?"Reading…":"Extract tasks";
  $("#extractIcon").classList.toggle("spin",on);
}

// ── Manual mode ────────────────────────────────────────────
$("#copyBtn").onclick=async()=>{
  const text=$("#input").value.trim(); if(!text) return;
  try{ await navigator.clipboard.writeText(buildPrompt(text,draftSrc)); $("#copied").textContent="Copied — paste into Claude"; }
  catch{ $("#copied").textContent="Couldn't copy — try manually"; }
  setTimeout(()=>$("#copied").textContent="",2800);
};
$("#importBtn").onclick=()=>{
  const e2=$("#err2"); e2.style.display="none";
  try{
    const raw=$("#pasteBack").value.replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(raw);
    if(!Array.isArray(parsed)) throw new Error("Expected a JSON array");
    addParsed(parsed); $("#pasteBack").value=""; $("#input").value=""; closeSheet();
  }catch(e){ e2.textContent="Invalid JSON: "+e.message; e2.style.display="block"; }
};

// ── Escape ─────────────────────────────────────────────────
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ── Boot ───────────────────────────────────────────────────
renderDatePill();
renderSetupBanner();
if(syncCfg) syncDown(); else setSyncStatus("offline");
renderAll();
</script>
</body>
</html>
